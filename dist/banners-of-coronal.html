<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BANNER COMMAND — The Banners of Coronal</title>
<style>
:root{
  --gold:#f8d878; --gold-dim:#b09040; --text:#f0f2ff; --dim:#8e98c8;
  --hp:#48c848; --hurt:#e8a030; --danger:#e05050; --mag:#78a0f8;
  --p0:#5888f0; --p1:#50b068; --p2:#e0a840; --p3:#a868d8;
  --grass:#4a8c3c; --grass2:#417f35;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{
  color:var(--text); font-family:'Press Start 2P','Courier New',Courier,monospace;
  image-rendering:pixelated; font-weight:bold; text-transform:uppercase;
  background:#05060f;
}
body{
  display:flex; flex-direction:column; align-items:center; padding:8px; min-height:100vh;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.015) 0 1px, transparent 1px 3px),
    radial-gradient(ellipse 120% 90% at 50% -10%, #101838 0%, #05060f 70%);
}
.ffwin{
  background:linear-gradient(180deg,#2a41b4 0%,#131e66 45%,#060a2e 100%);
  border:2px solid #f4f4f4; border-radius:7px;
  box-shadow:0 0 0 3px #000, inset 0 0 0 2px #0a1030, inset 0 2px 0 2px rgba(160,180,255,.30);
  padding:10px;
}
button.ff{
  font-family:inherit; font-size:8px; color:var(--text); letter-spacing:1px; text-transform:uppercase;
  background:linear-gradient(180deg,#3a54d8 0%,#1a2678 55%,#0c1140 100%);
  border:2px solid #f4f4f4; border-radius:6px; padding:8px 11px; cursor:pointer;
  box-shadow:0 0 0 2px #000, inset 0 1px 0 rgba(190,205,255,.5);
}
button.ff:hover{background:linear-gradient(180deg,#4a66f0,#222f90 55%,#101650);}
button.ff:active{transform:translateY(1px);}
button.ff:disabled{opacity:.4; cursor:default; transform:none;}
button.ff.gold{color:#1a1204; background:linear-gradient(180deg,#ffe89a,#d8a838 55%,#9a7420); text-shadow:0 1px 0 rgba(255,255,255,.4);}
button.ff.gold:hover{background:linear-gradient(180deg,#fff0b0,#e8b848 55%,#a88028);}
button.ff.red{color:#fff; background:linear-gradient(180deg,#e06858,#902828 55%,#500f0f);}
.shead{display:flex; align-items:center; gap:8px; font-size:8px; color:var(--gold); letter-spacing:2px; margin-bottom:8px;}
.shead::before,.shead::after{content:''; flex:1; height:2px; background:linear-gradient(90deg,transparent,var(--gold-dim));}
.shead::after{background:linear-gradient(90deg,var(--gold-dim),transparent);}
.screen{display:none; width:100%; max-width:980px; flex-direction:column; gap:8px;}
.screen.on{display:flex;}
.modal{display:none; position:fixed; inset:0; background:rgba(2,3,12,.88); z-index:70; align-items:center; justify-content:center; padding:10px;}
.modal.show{display:flex;}
.modal .inner{max-width:660px; width:100%; max-height:94vh; overflow-y:auto;}
.modalbtns{display:flex; gap:8px; justify-content:center; margin-top:10px; flex-wrap:wrap;}
.hpbarbig{height:7px; background:#060820; border:1px solid #39439a; border-radius:3px; overflow:hidden;}
.hpbarbig i{display:block; height:100%; background:linear-gradient(90deg,#2f9a2f,#67e067);}
.hpbarbig i.mid{background:linear-gradient(90deg,#b07820,#e8a030);}
.hpbarbig i.low{background:linear-gradient(90deg,#a03028,#e05050);}
.xpbar{height:6px; background:#060820; border:1px solid #7284d8; border-radius:3px; overflow:hidden;}
.xpbar i{display:block; height:100%; background:linear-gradient(90deg,#4878e0,#8ab4ff);}
.pennant{width:11px; height:15px; flex:none; clip-path:polygon(0 0,100% 0,100% 100%,50% 72%,0 100%); box-shadow:inset 0 0 0 1px rgba(0,0,0,.35);}

/* ============ TITLE ============ */
#title{align-items:center; text-align:center; gap:14px; padding-top:24px;}
#title h1{font-size:20px; color:var(--gold); letter-spacing:4px; text-shadow:0 4px 0 #000, 0 0 24px rgba(248,216,120,.3); line-height:1.6;}
#title .tsub{font-size:8px; color:var(--dim); letter-spacing:3px;}
#title .tscene{width:100%; max-width:520px; height:150px; position:relative; overflow:hidden; border:2px solid #f4f4f4; border-radius:7px; box-shadow:0 0 0 3px #000;
  background:linear-gradient(180deg,#0c1030 0%,#1a1c4e 30%,#4a2c60 55%,#a85838 74%,#e8964a 84%,#241a34 84.5%,#181226 100%);}
#title .tscene .m1{position:absolute; bottom:24px; left:0; right:0; height:70px; background:#221a44;
  clip-path:polygon(0 100%,0 60%,10% 34%,22% 66%,36% 28%,50% 62%,64% 36%,78% 68%,90% 44%,100% 60%,100% 100%);}
#title .tscene .kp{position:absolute; bottom:44px; left:58%; width:60px; height:48px; background:#100c20;}
#title .tscene .kp::before{content:''; position:absolute; top:-10px; left:4px; width:9px; height:10px; background:#100c20; box-shadow:15px 0 0 #100c20, 31px 0 0 #100c20, 46px 0 0 #100c20;}
#title .tscene .kp i{position:absolute; width:3px; height:4px; background:#ffca60; box-shadow:0 0 8px #ffca60;}
#title button{font-size:10px; padding:12px 26px;}

/* ============ WORLD MAP ============ */
#world .wmap{position:relative; width:100%; height:440px; border:2px solid #f4f4f4; border-radius:7px; overflow:hidden;
  box-shadow:0 0 0 3px #000;
  background:
    radial-gradient(ellipse 50% 30% at 76% 20%, #6a5878 0%, transparent 60%),
    radial-gradient(ellipse 46% 26% at 20% 78%, #3f6d38 0%, transparent 62%),
    radial-gradient(ellipse 60% 40% at 40% 40%, #55804a 0%, transparent 65%),
    linear-gradient(160deg,#3c6a36 0%,#48793c 34%,#597f42 55%,#6a7050 75%,#585066 100%);}
#world .wmap::before{content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(45deg, rgba(0,0,0,.05) 0 2px, transparent 2px 6px); pointer-events:none;}
.wriver{position:absolute; width:5px; background:linear-gradient(180deg,#3a6cc8,#2b4f9e); border-radius:3px; opacity:.85;}
svg.wroutes{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
.wnode{position:absolute; width:26px; height:26px; margin:-13px 0 0 -13px; border-radius:50%; cursor:pointer; z-index:5;
  display:flex; align-items:center; justify-content:center; font-size:11px; font-family:sans-serif;
  background:radial-gradient(circle at 40% 35%, #d9dcf0, #7a84b4); border:2px solid #000; box-shadow:0 2px 0 rgba(0,0,0,.5);}
.wnode.story{background:radial-gradient(circle at 40% 35%, #ffe9a0, #c89a30);}
.wnode.done{background:radial-gradient(circle at 40% 35%, #9ad19a, #4c8a4c);}
.wnode.locked{filter:grayscale(1) brightness(.5); cursor:default;}
.wnode.cur{outline:3px solid var(--gold); outline-offset:2px; animation:npulse 1s steps(2) infinite;}
@keyframes npulse{50%{outline-color:transparent;}}
.wlabel{position:absolute; font-size:5px; color:#fff; text-shadow:1px 1px 0 #000; letter-spacing:1px; transform:translate(-50%,16px); white-space:nowrap; z-index:5; pointer-events:none;}
#cmdtoken{position:absolute; width:30px; height:34px; margin:-40px 0 0 -15px; z-index:8; pointer-events:none; transition:left .5s steps(6), top .5s steps(6);}
#cmdtoken img{width:30px; height:34px; image-rendering:pixelated; filter:drop-shadow(0 3px 0 rgba(0,0,0,.5));}
#wbar{display:flex; gap:6px; align-items:center; flex-wrap:wrap; padding:7px 10px; font-size:7px;}
#wbar .gap{flex:1;}
#wpanel{min-height:64px; font-size:7px; line-height:1.9;}

/* ============ MUSTER (battle prep) ============ */
#battleName{padding:9px 12px; text-align:center; font-size:8px; letter-spacing:1px; line-height:1.9;}
#battleName .bn-chapter{color:var(--dim); font-size:6px; letter-spacing:3px;}
#battleName .bn-title{color:var(--gold); font-size:11px; letter-spacing:2px; text-shadow:0 2px 0 #000;}
#battleName .bn-sub{color:var(--dim); font-size:6px; letter-spacing:1px;}
#stage{position:relative; border:2px solid #f4f4f4; border-radius:7px; overflow:hidden;
  box-shadow:0 0 0 3px #000; padding:12px; display:flex; flex-direction:column; gap:10px;
  background:linear-gradient(180deg,#0c1030 0%,#1a1c4e 30%,#4a2c60 55%,#a85838 74%,#e8964a 84%,#3c2848 84.5%,#241a34 100%);}
#stage .stars{position:absolute; inset:0 0 40% 0; background-image:
  radial-gradient(1px 1px at 12% 22%, #fff 50%, transparent 51%),
  radial-gradient(1px 1px at 34% 12%, #cdd8ff 50%, transparent 51%),
  radial-gradient(1px 1px at 58% 28%, #fff 50%, transparent 51%),
  radial-gradient(1px 1px at 73% 10%, #ffe9b0 50%, transparent 51%),
  radial-gradient(1px 1px at 88% 24%, #fff 50%, transparent 51%);
  animation:twinkle 3s steps(2) infinite;}
@keyframes twinkle{50%{opacity:.55;}}
#stage .range{position:absolute; left:0; right:0; height:90px;}
#stage .range.far{bottom:15.2%; background:#2a2050;
  clip-path:polygon(0 100%,0 62%,7% 40%,15% 66%,24% 30%,33% 62%,42% 44%,52% 70%,61% 34%,70% 60%,79% 42%,88% 68%,95% 48%,100% 64%,100% 100%);}
#stage .range.near{bottom:15.2%; height:64px; background:#1c1638;
  clip-path:polygon(0 100%,0 76%,9% 52%,19% 78%,30% 46%,40% 74%,50% 58%,62% 82%,72% 50%,83% 76%,92% 60%,100% 78%,100% 100%);}
#stage .ground{position:absolute; bottom:0; left:0; right:0; height:15%;
  background:repeating-linear-gradient(90deg,#241a34 0 6px,#2a1f3c 6px 12px);}
#parties{position:relative; z-index:3; display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
@media(max-width:840px){#parties{grid-template-columns:repeat(2,1fr);}}
.pbox{padding:0 7px 7px; border:2px solid #f4f4f4; border-radius:7px;
  background:linear-gradient(180deg,rgba(26,38,132,.96) 0%,rgba(9,13,52,.97) 55%,rgba(3,5,24,.98) 100%);
  box-shadow:0 0 0 2px #000, 0 6px 0 rgba(0,0,0,.5), inset 0 2px 0 rgba(160,180,255,.25);}
.phead{display:flex; align-items:center; gap:5px; padding:7px 2px 6px; border-bottom:2px solid rgba(110,130,220,.35); margin-bottom:6px;}
.pbox[data-p="0"] .pennant{background:var(--p0);} .pbox[data-p="1"] .pennant{background:var(--p1);}
.pbox[data-p="2"] .pennant{background:var(--p2);} .pbox[data-p="3"] .pennant{background:var(--p3);}
.pname{background:none; border:none; color:var(--gold); font-family:inherit; font-size:7px; text-transform:uppercase;
  width:100%; min-width:0; letter-spacing:1px; padding:2px 0;}
.pname:focus{outline:none; text-decoration:underline dotted var(--gold-dim);}
.pcount{font-size:6px; color:var(--dim); flex:none;}
.rowlabel{font-size:5px; color:var(--dim); letter-spacing:2px; margin:2px 0 3px;}
.rowgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:4px;}
.slot{aspect-ratio:1; border:2px dashed rgba(110,130,220,.5); border-radius:5px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(2,4,20,.6); min-height:42px; overflow:hidden;}
.slot.open:hover{border-color:var(--gold); background:rgba(90,72,10,.35);}
.slot.filled{border-style:solid; border-color:#7284d8; background:radial-gradient(circle at 50% 26%, #223086 0%, #0a0f3c 70%);}
.slot.filled:hover{border-color:var(--danger);}
.slot img{width:28px; height:32px; image-rendering:pixelated; animation:pop .18s steps(3);}
@keyframes pop{from{transform:scale(.4);} to{transform:scale(1);}}
.slot .sname{font-size:5px; color:var(--dim); margin-top:1px;}
.slot.front-slot.filled{box-shadow:inset 0 -3px 0 rgba(232,120,64,.7);}
.slot.back-slot.filled{box-shadow:inset 0 -3px 0 rgba(88,136,240,.7);}
.pstats{display:flex; justify-content:space-around; font-size:6px; color:var(--dim); margin-top:6px;}
.pstats b{color:var(--text); display:block; text-align:center; font-size:7px; margin-top:2px;}
.pwarn{font-size:5px; color:var(--hurt); text-align:center; margin-top:4px; min-height:8px; letter-spacing:1px;}
#musterBtns{display:flex; gap:6px; align-items:center; flex-wrap:wrap; padding:7px 10px;}
.btnlabel{font-size:6px; color:var(--dim); letter-spacing:1px;}
.btngap{flex:1;}
.sortbtns{display:flex; gap:4px; align-items:center;}
.sortbtns button{font-size:6px; padding:5px 7px;}
.sortbtns button.on{color:var(--gold); border-color:var(--gold);}
#deployBtn{width:100%; font-size:11px; padding:13px; letter-spacing:2px;}
#deployBtn:not(:disabled){animation:ready 1.4s steps(2) infinite;}
@keyframes ready{50%{box-shadow:0 0 0 2px #000, 0 0 16px rgba(248,216,120,.55);}}
.m-main{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
@media(max-width:720px){.m-main{grid-template-columns:1fr;}}
#detail{display:flex; flex-direction:column; gap:7px; min-height:250px;}
.d-empty{color:var(--dim); font-size:7px; line-height:2.2; margin:auto; text-align:center; letter-spacing:1px;}
.d-top{display:flex; gap:10px;}
.d-portrait{width:92px; height:100px; flex:none; border:2px solid #7284d8; border-radius:6px;
  background:radial-gradient(ellipse 60% 16% at 50% 88%, rgba(0,0,0,.55), transparent 70%),
    radial-gradient(circle at 50% 24%, #2a3ca0 0%, #0a0f3c 75%);
  display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px;
  box-shadow:inset 0 0 14px rgba(0,0,0,.6);}
.d-portrait img{width:56px; height:64px; image-rendering:pixelated; animation:bob 1.1s steps(2) infinite;}
@keyframes bob{50%{transform:translateY(-3px);}}
.d-id{flex:1; min-width:0;}
.d-name{color:var(--gold); font-size:10px; letter-spacing:1px; text-shadow:0 2px 0 #000;}
.d-job{font-size:7px; color:var(--text); margin:4px 0 2px;}
.d-lv{font-size:6px; color:var(--dim);}
.statrow{display:flex; align-items:center; gap:6px; font-size:6px; margin-bottom:4px;}
.statrow .sl{width:26px; color:var(--dim);}
.statrow .sv{width:22px; text-align:right;}
.sbar{flex:1; height:6px; background:#060820; border:1px solid #39439a; border-radius:3px; overflow:hidden;}
.sbar i{display:block; height:100%;}
.sbar .hp{background:linear-gradient(90deg,#2f9a2f,#67e067);}
.sbar .atk{background:linear-gradient(90deg,#b04030,#f08858);}
.sbar .def{background:linear-gradient(90deg,#3858b8,#78a0f0);}
.sbar .mag{background:linear-gradient(90deg,#5848b8,#a888f8);}
.traitchip{display:inline-block; font-size:5px; color:#1a1204; background:linear-gradient(180deg,#ffe89a,#d8a838);
  border-radius:3px; padding:3px 6px; letter-spacing:1px; margin-top:2px; box-shadow:0 1px 0 #000;}
.movebox{border:2px solid #39439a; border-radius:6px; padding:6px 8px; font-size:6px; line-height:1.9; background:rgba(2,4,24,.5); text-transform:none;}
.movebox .mrow{font-size:5px; letter-spacing:2px; text-transform:uppercase;}
.movebox.front{border-left:5px solid rgba(232,120,64,.85);} .movebox.front .mrow{color:#f0a070;}
.movebox.back{border-left:5px solid rgba(88,136,240,.85);} .movebox.back .mrow{color:#88a8f0;}
.movebox.spec{border-left:5px solid rgba(168,136,248,.85);} .movebox.spec .mrow{color:#b8a0f8;}
.movebox .mvname{color:var(--text); font-size:7px; text-transform:uppercase;}
#roster{display:flex; flex-direction:column; max-height:320px;}
#rosterList{overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:#39439a #060820;}
.unit{display:flex; align-items:center; gap:8px; padding:5px 7px; margin-bottom:4px;
  border:2px solid #39439a; border-radius:6px; cursor:pointer; font-size:7px;
  background:linear-gradient(180deg,rgba(16,24,84,.5),rgba(4,6,30,.6)); position:relative;}
.unit:hover{border-color:#8ea4ff;}
.unit.sel{border-color:var(--gold); background:linear-gradient(180deg,rgba(96,76,10,.5),rgba(40,30,4,.6)); padding-left:17px;}
.unit.sel::before{content:'☞'; position:absolute; left:3px; color:var(--gold); font-size:10px; animation:pt .5s steps(2) infinite;}
@keyframes pt{50%{transform:translateX(2px);}}
.unit img{width:24px; height:28px; image-rendering:pixelated;}
.unit .uname{flex:1; letter-spacing:1px;}
.unit .ulv{color:var(--gold); font-size:6px;}
.unit .ujob{color:var(--dim); font-size:6px; width:64px; text-align:right;}
.ubadge{width:9px; height:13px; flex:none; clip-path:polygon(0 0,100% 0,100% 100%,50% 72%,0 100%);}
.ubadge.none{visibility:hidden;}
.unit.assigned{opacity:.82;}
#cfParties{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:9px; margin:8px 0;}
.cfp{border:2px solid #39439a; border-radius:6px; padding:7px; text-align:center; background:rgba(2,4,24,.5);}
.cfp .cfname{font-size:7px; color:var(--gold); margin-bottom:5px; letter-spacing:1px; display:flex; align-items:center; justify-content:center; gap:5px;}
.cfrow{display:flex; justify-content:center; gap:3px; min-height:30px; margin:2px 0;}
.cfrow img{width:22px; height:26px; image-rendering:pixelated;}
.cfrow.frontr{border-bottom:2px solid rgba(232,120,64,.55); padding-bottom:3px;}
.cfstats{font-size:5px; color:var(--dim); margin-top:5px; letter-spacing:1px;}

/* ============ FIELD ============ */
#field{align-items:center;}
#topbar{display:flex; gap:10px; align-items:center; font-size:8px; padding:6px 12px; width:100%; justify-content:space-between; flex-wrap:wrap;}
#mapwrap{position:relative; padding:8px; background:linear-gradient(180deg,#2a41b4 0%,#131e66 45%,#060a2e 100%);
  border:2px solid #f4f4f4; border-radius:7px; box-shadow:0 0 0 3px #000, inset 0 2px 0 2px rgba(160,180,255,.3); max-width:100%; overflow-x:auto;}
#map{display:grid; gap:0; border:2px solid #000; border-radius:2px;}
.tile{width:44px; height:44px; position:relative; display:flex; align-items:center; justify-content:center;}
.t-plain{background:var(--grass);} .t-plain.alt{background:var(--grass2);}
.t-dirt{background:#8a7448;} .t-dirt.alt{background:#7d6a42;}
.t-water{background:linear-gradient(180deg,#2f62c4,#22459c);} .t-water::after{content:'≈'; color:#5b8ae0; font-size:13px; position:absolute; font-family:sans-serif;}
.t-bridge{background:#a08050;} .t-bridge::after{content:'▤'; color:#7a5f38; font-size:16px; position:absolute; font-family:sans-serif;}
.t-wall{background:linear-gradient(180deg,#a8a8b8,#787888); box-shadow:inset 0 -4px 0 #5a5a6c, inset 0 2px 0 #d4d4e2;}
.t-crate{background:var(--grass);} .t-crate.alt{background:var(--grass2);}
.t-crate::after{content:'▣'; color:#a87838; text-shadow:0 -1px 0 #d8a868, 0 2px 0 #6c4a20; font-size:22px; position:absolute; font-family:sans-serif;}
.t-scrub{background:linear-gradient(180deg,#336d2c,#265423);} .t-scrub::after{content:'♣'; color:#153a13; text-shadow:0 -1px 0 #4d9840; font-size:16px; position:absolute; font-family:sans-serif;}
.t-fort{background:linear-gradient(180deg,#9aa2b4,#707a90);} .t-fort::after{content:'♜'; font-size:18px; position:absolute; font-family:sans-serif; color:#2c3244; text-shadow:0 -1px 0 #d0d6e4;}
.t-camp{background:linear-gradient(180deg,#7d6a44,#5d4e32);} .t-camp::after{content:'⛺'; font-size:15px; position:absolute; font-family:sans-serif; filter:drop-shadow(0 1px 0 #000);}
.tile.movable::before{content:''; position:absolute; inset:2px; background:rgba(120,168,248,.38); border:2px solid #a8c8ff; border-radius:3px; z-index:5; animation:pulse .9s steps(2) infinite;}
.tile.atkable::before{content:''; position:absolute; inset:2px; background:rgba(232,80,80,.45); border:2px solid #ffb0a0; border-radius:3px; z-index:5; animation:pulse .9s steps(2) infinite;}
@keyframes pulse{50%{opacity:.55;}}
.fog{position:absolute; inset:0; z-index:4; pointer-events:none;}
.fog.dark{background:linear-gradient(135deg,#05060f 25%,#080b1e 25% 50%,#05060f 50% 75%,#080b1e 75%); background-size:8px 8px;}
.fog.dim{background:rgba(8,12,44,.62);}
.fog.lit{background:transparent;}
.token{position:absolute; width:34px; height:34px; z-index:6; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:left .14s steps(3), top .14s steps(3);}
.token .body{width:30px; height:30px; border-radius:6px; border:2px solid #000; display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 0 rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.25);}
.token.pl .body{background:linear-gradient(180deg,#4868e8,#1830a0);}
.token.en .body{background:linear-gradient(180deg,#d84848,#801818); border-color:#ffd0c8;}
.token.sel .body{outline:2px solid var(--gold); outline-offset:1px;}
.token.moved .body{filter:saturate(.35) brightness(.75);}
.token .face{position:absolute; color:#fff; font-size:9px; text-shadow:1px 1px 0 #000; font-family:sans-serif; z-index:7;}
.face.N{top:-7px; left:50%; transform:translateX(-50%);}
.face.S{bottom:-7px; left:50%; transform:translateX(-50%);}
.face.E{right:-7px; top:50%; transform:translateY(-50%);}
.face.W{left:-7px; top:50%; transform:translateY(-50%);}

function makeSprite(job){
  const J=JOBS[job]; const pal={S:'#e8b888','.':null,...J.pal};
  const c=document.createElement('canvas'); c.width=14; c.height=14;
  const g=c.getContext('2d');
  SPRITE_MAP.forEach((row,y)=>[...row].forEach((ch,x)=>{ if(pal[ch]){g.fillStyle=pal[ch]; g.fillRect(x,y,1,1);} }));
  g.fillStyle='#181828'; g.fillRect(5,3,1,1); g.fillRect(8,3,1,1);
  const w=WEAPONS[J.weapon];
  if(w){ g.fillStyle=pal.w||'#999';
    for(let y=w.from;y<=w.to;y++) g.fillRect(w.col,y,1,1);
    g.fillStyle=w.tip; g.fillRect(w.col,w.from,1,1);
    if(w.guard!==undefined) g.fillRect(w.col-1,w.guard,3,1);

  }
  return c.toDataURL();
}

/* ---------- units & growth ---------- */
function baseStats(u){
  const J=JOBS[u.job];
  const lv=u.lv-1, star=u.star?1.25:1;
  u.maxhp=Math.round((J.hp+J.g[0]*lv)*star);
  u.atk=Math.round((J.atk+J.g[1]*lv)*star);
  u.def=Math.round((J.def+J.g[2]*lv)*star);
  u.mag=Math.round((J.mag+J.g[3]*lv)*star);
  u.spd=J.spd;
  u.trait=J.trait; u.rng=J.rng;
  u.front=J.front; u.back=J.back; u.spec=J.spec;
}
let UID=1;
function mkUnit(name,job,lv){
  const u={id:UID++,name,job,lv,xp:0,star:false,row:'front'};
  baseStats(u); u.hp=u.maxhp;
  return u;
}
function xpNeed(lv){ return lv*40; }
function grantXP(u,amt){
  if(u.hp<=0) amt=Math.round(amt*0.5);
  u.xp+=amt; let ups=0;
  while(u.xp>=xpNeed(u.lv) && u.lv<40){ u.xp-=xpNeed(u.lv); u.lv++; ups++; }
  if(ups){ const oldMax=u.maxhp; baseStats(u); u.hp=clamp(u.hp+(u.maxhp-oldMax),1,u.maxhp); }
  return ups;
}

  }catch(e){ return false; }

function nodeUnlocked(n){
  if(n.type==='free') return true;
  return n.ch<=G.chapter || G.cleared[n.i];
}
function enterWorld(){
  show('world');
  $('wch').textContent=G.openEnded?'∞':G.chapter;

  svg.setAttribute('class','wroutes');
  NODES.forEach(n=>n.links.forEach(l=>{

    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',n.x+'%'); line.setAttribute('y1',n.y+'%');
    line.setAttribute('x2',m.x+'%'); line.setAttribute('y2',m.y+'%');
    line.setAttribute('stroke','#f4f0da'); line.setAttribute('stroke-width','2');
    line.setAttribute('stroke-dasharray','3 5'); line.setAttribute('opacity','.8');
    svg.appendChild(line);
  }));
  wm.appendChild(svg);
  /* nodes */
  NODES.forEach(n=>{
    const el=document.createElement('div');
    const unlocked=nodeUnlocked(n);
    el.className='wnode'+(n.type==='story'?' story':'')+(G.cleared[n.i]?' done':'')+(unlocked?'':' locked')+(n.i===G.node?' cur':'');
    el.style.left=n.x+'%'; el.style.top=n.y+'%';
    el.innerHTML=n.type==='story'?(G.cleared[n.i]?'✓':'★'):'•';
    el.onclick=()=>tapNode(n,unlocked);
    wm.appendChild(el);
    const lb=document.createElement('div'); lb.className='wlabel';
    lb.style.left=n.x+'%'; lb.style.top=n.y+'%'; lb.textContent=n.n;
    wm.appendChild(lb);
  });
  /* commander token */
  const tk=document.createElement('div'); tk.id='cmdtoken';
  tk.innerHTML=spriteImg('Commander');
  tk.style.left=cur.x+'%'; tk.style.top=cur.y+'%';

  const injured=G.roster.filter(u=>u.hp<u.maxhp*0.5).length;
  $('wpanel').innerHTML=`<b style="color:var(--gold)">${cur.n}</b> — ${cur.type==='story'?(G.cleared[cur.i]?'The banners have passed this way.':'A chapter awaits.'):'Open country. Anything could find you here.'}<br>
   <span style="color:var(--dim)">BANNER: ${G.roster.length} SOULS · ${injured?injured+' WOUNDED · ':''}TAP A CONNECTED LOCATION TO MARCH.</span>`;
  $('btnParty').onclick=openPartyMenu;
  $('btnSave').onclick=saveGame;
}
function tapNode(n,unlocked){
  if(!unlocked){ toast('THE ROAD IS NOT YET OPEN'); return; }
  const cur=NODES[G.node];
  if(n.i===G.node){ arriveNode(n); return; }
  if(!cur.links.includes(n.i)){ toast('NO ROUTE FROM HERE'); return; }
  G.node=n.i;
  const tk=$('cmdtoken');
  tk.style.left=n.x+'%'; tk.style.top=n.y+'%';
  setTimeout(()=>{ enterWorld(); arriveNode(n); },520);
}
function arriveNode(n){
  if(n.type==='story'){
    if(!G.cleared[n.i] && n.ch===G.chapter){ openStory(n); }
    else if(G.cleared[n.i] && G.openEnded){ offerHunt(n); }
    return;
  }
  /* free node */
  if(Math.random()<0.6){
    const lv=G.openEnded? clamp(G.roster[0].lv-1,3,30) : clamp(G.chapter*2,2,26);
    const pool=(lv>=9?ELITE_POOL:FREE_FOE_POOL);
    const count=3+rnd(3);
    const foes=[]; for(let i=0;i<count;i++) foes.push([pick(pool),lv+rnd(2)]);
    startBattle({name:n.n.toUpperCase()+' — AMBUSH', sub:'RANDOM ENCOUNTER', map:pick(['fields','village','pass']),
      foes, packs:2, garrison:[[pick(FREE_FOE_POOL),lv]], node:null});
  } else {
    G.roster.forEach(u=>{ u.hp=clamp(u.hp+Math.round(u.maxhp*0.5),1,u.maxhp); });
    toast('A QUIET CAMP — THE BANNER RESTS (+50% HP)');
    enterWorld();
  }
}
function offerHunt(n){
  const lv=clamp(G.roster[0].lv,10,34);
  const foes=[]; const count=4+rnd(3);
  for(let i=0;i<count;i++) foes.push([pick(ELITE_POOL),lv+rnd(3)]);

const PCOLORS=['#5888f0','#50b068','#e0a840','#a868d8'];
function partySpeed(units){
  if(!units.length) return 0;
  let s=Math.max(2, 6-units.length);
  if(units.length<=2 && units.some(u=>u.trait==='ninja'||u.trait==='scout')) s+=2;
  if(units.some(u=>u.trait==='mount')) s=Math.max(s+1,4);
  return s;
}
const partyPower=us=>us.reduce((a,u)=>a+u.atk,0);
const partyDefT=us=>us.reduce((a,u)=>a+u.def,0);
const healers=us=>us.filter(u=>u.trait==='healer').length;

/* ---------- MUSTER ---------- */
let slots, selUnit=null, sortMode='name', curBattle=null;
const partyIds=p=>[...slots[p].front,...slots[p].back].filter(v=>v!==null);
const partyUnitsOf=p=>partyIds(p).map(id=>G.roster.find(u=>u.id===id));
function locate(id){
  for(let p=0;p<4;p++) for(const row of ['front','back']){
    const i=slots[p][row].indexOf(id); if(i>=0) return {p,row,i};
  } return null;
}

function sortedRoster(){
  const r=G.roster.map(u=>u.id);
  const U=id=>G.roster.find(u=>u.id===id);
  if(sortMode==='level') r.sort((a,b)=>U(b).lv-U(a).lv);
  else if(sortMode==='type') r.sort((a,b)=>U(a).job.localeCompare(U(b).job)||U(b).lv-U(a).lv);
  else r.sort((a,b)=>U(a).name.localeCompare(U(b).name));
  const c=r.indexOf(G.roster[0].id); if(c>0){r.splice(c,1); r.unshift(G.roster[0].id);}
  return r;
}
function autoFill(){
  slots=[0,1,2,3].map(()=>({front:[null,null,null],back:[null,null,null]}));
  const rest=[...G.roster];
  const take=f=>{const i=rest.findIndex(f); return i>=0?rest.splice(i,1)[0]:null;};
  const put=(p,row,u)=>{ if(!u)return; const i=slots[p][row].indexOf(null); if(i>=0)slots[p][row][i]=u.id; };
  /* vanguard: commander + heavies front, healer+mage back */
  put(0,'front',take(u=>u.job==='Commander'));
  put(0,'front',take(u=>['Knight','Paladin','Dark Knight','Warden','Charger','Centaur'].includes(u.job)));
  put(0,'front',take(u=>['Monk','Master','Mystic','Soldier','Captain','Berserker','War Priest'].includes(u.job)));
  put(0,'back',take(u=>u.trait==='healer'));
  put(0,'back',take(u=>['Mage','Wizard','Sage'].includes(u.job)));
  /* reserve squad */
  put(1,'front',take(u=>u.trait==='mount'));
  put(1,'front',take(u=>['Soldier','Captain','Berserker','Monk','Master'].includes(u.job)));
  put(1,'back',take(u=>u.trait==='healer'));
  put(1,'back',take(u=>['Archer','Sniper','Ranger'].includes(u.job)));
  /* outriders: fast pair */
  put(2,'front',take(u=>u.trait==='ninja'));
  put(2,'back',take(u=>u.trait==='scout'));
  /* leftovers */
  rest.forEach(u=>{
    for(let p=0;p<4;p++){ for(const row of ['front','back']){
      const i=slots[p][row].indexOf(null);
      if(i>=0 && partyIds(p).length<6){ slots[p][row][i]=u.id; return; }
    }}
  });
  selUnit=null; drawMuster();
}
function drawMuster(){
  const L=$('rosterList'); L.innerHTML='';
  sortedRoster().forEach(id=>{
    const u=G.roster.find(x=>x.id===id), loc=locate(id);
    const d=document.createElement('div');
    d.className='unit'+(selUnit===id?' sel':'')+(loc?' assigned':'');
    d.innerHTML=`<span class="ubadge ${loc?'':'none'}" style="background:${loc?PCOLORS[loc.p]:'transparent'}"></span>
      ${spriteImg(u.job)}<span class="uname">${u.name}${u.star?'★':''}</span>
      <span class="ulv">LV${u.lv}</span><span class="ujob">${u.job}</span>`;
    d.onclick=()=>{selUnit=selUnit===id?null:id; drawMuster();};
    L.appendChild(d);
  });
  drawDetail();
  document.querySelectorAll('.pbox').forEach(box=>{
    const p=+box.dataset.p, units=partyUnitsOf(p);
    const rowHTML=(row,cls,label)=>`<div class="rowlabel">${label}</div>
      <div class="rowgrid">${slots[p][row].map((uid,i)=>{
        if(uid===null) return `<div class="slot open ${cls}" data-row="${row}" data-i="${i}"></div>`;
        const u=G.roster.find(x=>x.id===uid);
        return `<div class="slot filled ${cls}" data-row="${row}" data-i="${i}">${spriteImg(u.job)}<span class="sname">${u.name}</span></div>`;
      }).join('')}</div>`;
    let warn='&nbsp;';
    if(units.length){
      if(!healers(units)) warn='⚠ NO HEALER';
      if(!slots[p].front.some(v=>v!==null)) warn='⚠ EMPTY FRONT ROW';
    }
    box.innerHTML=`<div class="phead"><span class="pennant"></span>
      <input class="pname" value="${G.pNames[p]}" maxlength="12" spellcheck="false">
      <span class="pcount">${units.length}/6</span></div>
      ${rowHTML('back','back-slot','BACK ROW')}
      ${rowHTML('front','front-slot','FRONT ROW')}
      <div class="pstats"><span>SPD<b>${partySpeed(units)}</b></span><span>ATK<b>${partyPower(units)}</b></span>
      <span>DEF<b>${partyDefT(units)}</b></span><span>HEAL<b>${healers(units)}</b></span></div>
      <div class="pwarn">${warn}</div>`;
    box.querySelector('.pname').oninput=e=>{G.pNames[p]=e.target.value.toUpperCase()||('PARTY '+(p+1));};
    box.querySelectorAll('.slot').forEach(s=>{ s.onclick=()=>openPicker(p,s.dataset.row,+s.dataset.i); });
  });
  const n=[0,1,2,3].reduce((a,p)=>a+partyIds(p).length,0);
  const btn=$('deployBtn');
  btn.disabled=n!==G.roster.length;
  btn.textContent=n===G.roster.length?'⚔ START BATTLE ⚔':`⚔ START BATTLE (${n}/${G.roster.length} MUSTERED)`;
}

function openPicker(p,row,i){
  const cur=slots[p][row][i];
  $('pickTitle').textContent=`${G.pNames[p]} · ${row.toUpperCase()} ROW · SLOT ${i+1}`;
  const list=$('pickList'); list.innerHTML='';

  });

  document.querySelectorAll('#tabbar button').forEach(b=>b.onclick=()=>{

const tileAt=(x,y)=>F.tileEls[y*F.W+x];
const passable=(x,y)=>x>=0&&y>=0&&x<F.W&&y<F.H&&F.COST[F.grid[y][x]]!==undefined;
const cheb=(x1,y1,x2,y2)=>Math.max(Math.abs(x1-x2),Math.abs(y1-y2));
const DIRS={N:[0,-1],S:[0,1],E:[1,0],W:[-1,0]};
const ARROW={N:'▲',S:'▼',E:'▶',W:'◀'};
const TILEC={'.':'t-plain','c':'t-crate','#':'t-wall','w':'t-water','b':'t-bridge','F':'t-fort','C':'t-camp','s':'t-scrub'};
function buildTiles(){

function visionOf(p){
  const alive=p.units.filter(u=>u.hp>0);
  let r=2;
  if(partySpeed(alive)>=5)r=3;
  if(alive.some(u=>u.trait==='scout'))r=4;
  return r;
}
function addVision(set,x,y,r){
  for(let yy=Math.max(0,y-r);yy<=Math.min(F.H-1,y+r);yy++)
    for(let xx=Math.max(0,x-r);xx<=Math.min(F.W-1,x+r);xx++)
      if(cheb(x,y,xx,yy)<=r)set.add(xx+','+yy);
}
function computeVision(){
  F.visible=new Set();
  F.parties.filter(p=>p.side==='pl').forEach(p=>addVision(F.visible,p.x,p.y,visionOf(p)));
  addVision(F.visible,F.HQ_PL.x,F.HQ_PL.y,2);
  F.towers.forEach(t=>addVision(F.visible,t.x,t.y,4));
  F.visible.forEach(k=>F.explored.add(k));

}
function renderFog(){

function drawGarrisonBadges(){

function partyAtF(x,y){ return F.parties.find(p=>p.x===x&&p.y===y&&p.units.some(u=>u.hp>0)); }
function bfsF(p){
  /* Dial's algorithm: tile costs are only 1 or 2, so a bucket queue gives exact
     shortest paths in O(V+E) — a plain FIFO queue would be wrong here since
     scrub tiles cost more than plain ground, breaking BFS's equal-weight assumption. */
  const spd=partySpeed(p.units.filter(u=>u.hp>0));
  const dist={},prev={}; const startKey=p.x+','+p.y; dist[startKey]=0;
  const buckets=[[[p.x,p.y]]];
  for(let d=0;d<=spd;d++){
    const bucket=buckets[d]; if(!bucket)continue;
    for(const [cx,cy] of bucket){
      if(dist[cx+','+cy]!==d)continue; /* stale entry, already improved */
      for(const k in DIRS){
        const nx=cx+DIRS[k][0],ny=cy+DIRS[k][1];
        if(!passable(nx,ny))continue;
        if(partyAtF(nx,ny))continue;
        if(nx===F.HQ_EN.x&&ny===F.HQ_EN.y&&F.HQ_EN.garrison.some(u=>u.hp>0))continue;
        const nd=d+F.COST[F.grid[ny][nx]];
        if(nd>spd)continue;
        const key=nx+','+ny;
        if(dist[key]===undefined||nd<dist[key]){
          dist[key]=nd; prev[key]=cx+','+cy;
          (buckets[nd]=buckets[nd]||[]).push([nx,ny]);
        }
      }
    }
  }
  return {dist,prev,spd};
}
function pathToF(reach,x,y){
  const path=[]; let key=x+','+y;
  while(key&&reach.prev[key]){
    const [px,py]=key.split(',').map(Number);
    path.unshift([px,py]); key=reach.prev[key];
  }
  return path;
}
async function walk(p,path){
  F.animating=true;
  for(const [x,y] of path){
    p.face=x>p.x?'E':x<p.x?'W':y>p.y?'S':'N';
    p.x=x; p.y=y; placeTok(p);
    if(p.side==='pl')computeVision(); else renderFog();
    await new Promise(r=>setTimeout(r,140));
  }
  F.animating=false;
}
function clearHi(){ F.tileEls.forEach(t=>t.classList.remove('movable','atkable')); }
function adjacentEnemies(p){
  const out=[];
  for(const k in DIRS){
    const x=p.x+DIRS[k][0],y=p.y+DIRS[k][1];
    const occ=partyAtF(x,y);
    if(occ&&occ.side!==p.side&&(p.side==='en'||F.visible.has(x+','+y)))out.push(occ);
    if(p.side==='pl'&&x===F.HQ_EN.x&&y===F.HQ_EN.y)out.push(F.HQ_EN);
    if(p.side==='en'&&x===F.HQ_PL.x&&y===F.HQ_PL.y)out.push(F.HQ_PL);
  }
  return out;
}
/* deploy phase */
function spawnTilesF(){
  const out=[];
  for(let y=0;y<F.H;y++)for(let x=0;x<F.W;x++)
    if(cheb(x,y,F.HQ_PL.x,F.HQ_PL.y)<=2&&passable(x,y)&&!(x===F.HQ_PL.x&&y===F.HQ_PL.y)&&!partyAtF(x,y)&&!F.towers.some(t=>t.x===x&&t.y===y))
      out.push([x,y]);
  return out;
}
function towerTilesF(){
  const out=[];
  for(let y=0;y<F.H;y++)for(let x=0;x<F.W;x++)
    if(cheb(x,y,F.HQ_PL.x,F.HQ_PL.y)<=4&&passable(x,y)&&!(x===F.HQ_PL.x&&y===F.HQ_PL.y)&&!partyAtF(x,y)&&!F.towers.some(t=>t.x===x&&t.y===y))
      out.push([x,y]);
  return out;
}

function facingBonusFrom(fx,fy,def){
  const dx=Math.sign(def.x-fx),dy=Math.sign(def.y-fy);
  const appr=Math.abs(dx)>=Math.abs(dy)?(dx>0?'E':'W'):(dy>0?'S':'N');
  const OPP={N:'S',S:'N',E:'W',W:'E'};
  if(def.face===OPP[appr])return{mult:1.5,label:'BACK ATTACK!',adv:60,flip:true};
  if(def.face===appr)return{mult:1.0,label:'ENGAGEMENT',adv:20,flip:false};
  return{mult:1.25,label:'SIDE ATTACK!',adv:40,flip:false};
}
function fieldAttack(att,def){
  const fb=facingBonusFrom(att.x,att.y,def);
  att.moved=true; att.acted=true;
  announce(`<div class="big">${fb.label}</div>${att.side==='pl'?att.id:'☠ '+att.id} engages ${def.id}!`);
  return openATB({pl:att.side==='pl'?att:def, en:att.side==='pl'?def:att,
    attackerIsPl:att.side==='pl', fb, siege:null});
}
function fieldSiege(att,hq){
  const gU=hq.garrison.filter(u=>u.hp>0);
  if(!gU.length){
    if(hq===F.HQ_EN){flog(att.id+' storms the undefended keep!','good'); fieldEnd(true);}
    else{flog('The camp falls!','bad'); fieldEnd(false);}
    return Promise.resolve();
  }
  att.moved=true; att.acted=true;
  const gar={id:hq.type+' GARRISON', side:att.side==='pl'?'en':'pl', units:hq.garrison, isGarrison:hq};
  announce(`<div class="big">SIEGE!</div>${att.side==='pl'?att.id:'☠ '+att.id} assaults the ${hq.type}!`);
  return openATB({pl:att.side==='pl'?att:gar, en:att.side==='pl'?gar:att,
    attackerIsPl:att.side==='pl', fb:{mult:1,label:'SIEGE',adv:0,flip:false}, siege:hq});
}

/* ================= ATB BATTLE ================= */
let B=null;
const ACTICON={attack:'⚔',defend:'🛡',special:'✦',retreat:'🏃'};
function openATB(cfg){
  let resolveEnd;
  const done=new Promise(res=>{resolveEnd=res;});
  hideOrders(); clearHi();
  const modal=document.createElement('div');
  modal.id='atb'; modal.className='modal show';
  modal.innerHTML=`<div class="inner ffwin">
    <div id="atbTop">
      <span class="abadge">${cfg.fb.label}</span>
      <span style="color:var(--dim)" id="atbNames"></span>
      <span style="color:var(--dim);font-size:6px">TAP A UNIT TO SET ORDERS</span>
    </div>
    <div id="atbArena">
      <div class="atbside" id="enSide"></div>
      <div class="atbside" id="plSide"></div>
    </div>
    <div id="atbBtns">
      <button class="ff" id="btnRows">⇅ CHANGE ROWS</button>
      <button class="ff" id="btnRetreatAll">🏃 FULL RETREAT</button>
    </div>
    <div id="atbLog"></div>
    <div id="actMenu"></div>
  </div>`;
  document.body.appendChild(modal);
  const plParty=cfg.pl, enParty=cfg.en;
  $('atbNames').textContent=(plParty.id||'BANNER')+' VS '+(enParty.id||'FOE');
  B={cfg, pl:[], en:[], over:false, ticker:null, queue:[], acting:false,
     plFlip:false, buffs:{plAtk:1,plDef:1,enAtk:1,enDef:1}, cds:{}, t:0, onEnd:resolveEnd};
  const mkSide=(party,side)=>{
    return party.units.filter(u=>u.hp>0).map(u=>{
      const bu={u, side, atb:rnd(25), act:'attack', retreated:false,
        marked:false, vanished:false, rageT:0, fadeT:0, row:u.row||'front'};
      if(party.isGarrison){ bu.act = bu.row==='front'?'defend':'attack'; }
      return bu;
    });
  };
  B.pl=mkSide(plParty,'pl'); B.en=mkSide(enParty,'en');
  /* initiative & back-attack row flip */
  if(cfg.attackerIsPl){ B.pl.forEach(b=>b.atb+=cfg.fb.adv); if(cfg.fb.flip) B.en.forEach(b=>b.row=b.row==='front'?'back':'front'); }
  else { B.en.forEach(b=>b.atb+=cfg.fb.adv); if(cfg.fb.flip) B.pl.forEach(b=>b.row=b.row==='front'?'back':'front'); }
  renderATB();
  $('btnRows').onclick=()=>{ if(B.over)return;
    B.plFlip=!B.plFlip;
    $('btnRows').classList.toggle('gold',B.plFlip);
    atbLog(B.plFlip?'The banner prepares to wheel about — all wait for the turn!':'Wheel-about cancelled.','imp');
  };
  $('btnRetreatAll').onclick=()=>{ if(B.over)return;
    B.pl.forEach(b=>{ if(b.u.hp>0&&!b.retreated) b.act='retreat'; });
    renderATB(); atbLog('Full retreat ordered!','imp');
  };
  B.ticker=setInterval(tickATB,90);
  return done;
}
function unitCard(b){
  const u=b.u;
  const pct=Math.max(0,u.hp/u.maxhp*100);
  return `<div class="au ${b.side==='en'?'en':''} ${u.hp<=0?'dead':''}" data-id="${u.id}">
    <span class="aact">${b.retreated?'💨':ACTICON[b.act]||''}${b.vanished?'◌':''}${b.marked?'◎':''}</span>
    ${spriteImg(u.job)}
    <div class="aun">${u.name}</div>
    <div class="auhp"><i class="${pct<30?'low':pct<60?'mid':''}" style="width:${pct}%"></i></div>
    <div class="auatb"><i class="${b.atb>=100?'full':''}" style="width:${clamp(b.atb,0,100)}%"></i></div>
  </div>`;
}
function renderATB(){
  const col=(arr,row)=>`<div class="atbcol">${arr.filter(b=>b.row===row&&!b.retreated).map(unitCard).join('')}</div>`;
  /* enemy: back col outer-left, front col inner; player: front inner, back outer-right */
  $('enSide').innerHTML=col(B.en,'back')+col(B.en,'front');
  $('plSide').innerHTML=col(B.pl,'front')+col(B.pl,'back');
  document.querySelectorAll('#plSide .au').forEach(el=>{
    el.onclick=e=>{e.stopPropagation(); openActMenu(+el.dataset.id, el);};
  });
  $('actMenu').style.display='none';
}
function openActMenu(uid,anchor){
  if(B.over)return;
  const b=B.pl.find(x=>x.u.id===uid); if(!b||b.u.hp<=0||b.retreated)return;
  const m=$('actMenu');
  const isCmdr=b.u.job==='Commander';
  let html=`<button data-a="attack" class="${b.act==='attack'?'cur':''}">⚔ ATTACK</button>
    <button data-a="defend" class="${b.act==='defend'?'cur':''}">🛡 DEFEND</button>`;
  if(isCmdr){
    html+=CMD_ABILITIES.filter(a=>G.abilities.includes(a.k)).map(a=>{
      const cd=Math.max(0,Math.ceil(((B.cds[a.k]||0)-B.t)/1000));
      return `<button data-cmd="${a.k}" ${cd?'disabled':''} class="${b.act==='special'&&b.cmdAb===a.k?'cur':''}">✦ ${a.n}${cd?' ('+cd+')':''}</button>`;
    }).join('');
  } else if(b.u.spec){
    html+=`<button data-a="special" class="${b.act==='special'?'cur':''}">✦ ${b.u.spec.n}</button>`;
  }
  html+=`<button data-a="retreat" class="${b.act==='retreat'?'cur':''}">🏃 RETREAT</button>`;
  m.innerHTML=html;
  const arena=$('atbArena').getBoundingClientRect();
  const r=anchor.getBoundingClientRect();
  const inner=anchor.closest('.inner').getBoundingClientRect();
  m.style.left=clamp(r.left-inner.left-14,4,inner.width-112)+'px';
  m.style.top=clamp(r.top-inner.top+r.height-6,4,inner.height-150)+'px';
  m.style.display='block';
  m.querySelectorAll('[data-a]').forEach(btn=>btn.onclick=e=>{
    e.stopPropagation(); b.act=btn.dataset.a; b.cmdAb=null; renderATB();
  });
  m.querySelectorAll('[data-cmd]').forEach(btn=>btn.onclick=e=>{
    e.stopPropagation(); b.act='special'; b.cmdAb=btn.dataset.cmd; renderATB();
  });
}
document.addEventListener('click',()=>{ const m=$('actMenu'); if(m)m.style.display='none'; });
function atbLog(msg,cls){ const l=$('atbLog'); if(!l)return;
  l.innerHTML+=`<div class="${cls||''}">▸ ${msg}</div>`; l.scrollTop=l.scrollHeight; }
function dmgPop(uid,txt,cls){
  const el=document.querySelector(`#atb .au[data-id="${uid}"]`);
  if(!el)return;
  const p=document.createElement('div'); p.className='dmgpop '+(cls||'');
  p.textContent=txt;
  p.style.left=(14+rnd(24))+'px'; p.style.top='4px';
  el.appendChild(p); setTimeout(()=>p.remove(),820);
}
function flash(uid,cls){
  const el=document.querySelector(`#atb .au[data-id="${uid}"]`);
  if(el){el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls);}
}
function livingSide(arr){ return arr.filter(b=>b.u.hp>0&&!b.retreated); }
function pickTarget(attackerSide){
  const foes=livingSide(attackerSide==='pl'?B.en:B.pl).filter(b=>!b.vanished);
  if(!foes.length)return null;
  const taunts=foes.filter(b=>b.act==='defend'&&b.row==='front');
  if(taunts.length)return pick(taunts);
  const front=foes.filter(b=>b.row==='front');
  if(front.length)return pick(front);
  return pick(foes);
}
function effDef(bu){ return bu.rageT>B.t ? bu.u.def*0.65 : bu.u.def; } /* BLOOD RAGE: reckless, DEF down */
function dealDamage(src,tgt,raw,cls){
  let dmg=raw;
  if(tgt.act==='defend')dmg*=0.5;
  if(tgt.marked)dmg*=1.3;
  if(tgt.fadeT>B.t)dmg*=0.4;
  const sideDef=tgt.side==='pl'?B.buffs.plDef:B.buffs.enDef;
  dmg=Math.max(1,Math.round(dmg/sideDef));
  tgt.u.hp=Math.max(0,tgt.u.hp-dmg);
  flash(tgt.u.id,'hit');
  dmgPop(tgt.u.id,dmg,cls);
  if(tgt.u.hp<=0){ tgt.act='attack'; atbLog(tgt.u.name+' falls!',tgt.side==='pl'?'':'imp'); }
  return dmg;
}
function unitAct(b){
  const u=b.u, foeSide=b.side==='pl'?'en':'pl';
  const atkMul=(b.side==='pl'?B.buffs.plAtk:B.buffs.enAtk)*(b.rageT>B.t?1.5:1);
  b.vanished=false;
  flash(u.id,'acting');
  if(b.act==='retreat'){
    b.retreated=true; atbLog(u.name+' withdraws from the field.','imp');
    renderATB(); return;
  }
  if(b.act==='defend'){ b.atb=0; return; } /* hold stance, regain readiness */
  if(b.act==='special'){
    if(u.job==='Commander'&&b.cmdAb){ commanderAbility(b); b.atb=0; return; }
    if(u.spec){ castSpec(b,u.spec,atkMul); b.atb=0; return; }
  }
  /* ATTACK */
  const tgt=pickTarget(b.side);
  if(!tgt){b.atb=0; return;}
  const rowPen=(b.row==='back'&&!u.rng)?0.6:1;
  const crit=Math.random()<0.08;
  let raw=(u.atk*2 - effDef(tgt))*rowPen*atkMul*(0.9+Math.random()*0.2);
  if(b.row==='front'&&u.rng&&u.job!=='Priest')raw*=1.15; /* point blank */
  raw=Math.max(2,raw)*(crit?1.7:1);
  dealDamage(b,tgt,raw,crit?'crit':'');
  if(u.job==='Assassin'&&tgt.u.hp>0&&tgt.u.hp<tgt.u.maxhp*0.3&&Math.random()<0.3){
    dealDamage(b,tgt,raw*0.8,'crit'); atbLog(u.name+' presses the kill!','imp');
  }
  b.atb=0;
}
function castSpec(b,sp,atkMul){
  const u=b.u, allies=livingSide(b.side==='pl'?B.pl:B.en), foes=livingSide(b.side==='pl'?B.en:B.pl);
  const M=u.mag;
  switch(sp.type){
    case 'heal':{ const t=allies.slice().sort((a,c)=>a.u.hp/a.u.maxhp-c.u.hp/c.u.maxhp)[0];
      if(t){const h=Math.round(M*2.2*sp.pow); t.u.hp=clamp(t.u.hp+h,0,t.u.maxhp); dmgPop(t.u.id,'+'+h,'heal'); atbLog(u.name+': '+sp.n+' heals '+t.u.name+'.');} break;}
    case 'healAll':{ allies.forEach(t=>{const h=Math.round(M*1.5*sp.pow); t.u.hp=clamp(t.u.hp+h,0,t.u.maxhp); dmgPop(t.u.id,'+'+h,'heal');}); atbLog(u.name+': '+sp.n+'!','imp'); break;}
    case 'selfheal':{ const h=Math.round(u.maxhp*0.35*sp.pow); u.hp=clamp(u.hp+h,0,u.maxhp); dmgPop(u.id,'+'+h,'heal'); break;}
    case 'aoe':{ const front=foes.filter(f=>f.row==='front'); (front.length?front:foes).forEach(t=>dealDamage(b,t,(M*2-effDef(t)*0.5)*sp.pow*atkMul,'magic')); atbLog(u.name+': '+sp.n+'!','imp'); break;}
    case 'aoeAll':{ foes.forEach(t=>dealDamage(b,t,(M*2-effDef(t)*0.4)*sp.pow*atkMul,'magic')); atbLog(u.name+': '+sp.n+'!','imp'); break;}
    case 'drain':{ const t=pickTarget(b.side); if(t){const d=dealDamage(b,t,(M+u.atk)*sp.pow*atkMul,'magic'); u.hp=clamp(u.hp+Math.round(d*0.6),0,u.maxhp); dmgPop(u.id,'+'+Math.round(d*0.6),'heal');} break;}
    case 'pierce':{ const t=pickTarget(b.side); if(t)dealDamage(b,t,(u.atk*2-effDef(t)*0.5)*sp.pow*atkMul,'crit'); break;}
    case 'exec':{ const weak=foes.slice().sort((a,c)=>a.u.hp-c.u.hp)[0]; if(weak)dealDamage(b,weak,(u.atk*sp.pow+ (weak.u.hp<weak.u.maxhp*0.35?u.atk:0))*atkMul,'crit'); atbLog(u.name+': EXECUTE!','imp'); break;}
    case 'stun':{ const t=pickTarget(b.side); if(t){dealDamage(b,t,(u.atk*1.6)*sp.pow*atkMul,''); t.atb=Math.min(t.atb,-30); atbLog(t.u.name+' is staggered!');} break;}
    case 'mark':{ const t=foes[rnd(foes.length)]; if(t){t.marked=true; dmgPop(t.u.id,'MARKED','magic'); atbLog(u.name+' marks '+t.u.name+'.');} break;}
    case 'buff':{ if(b.side==='pl')B.buffs.plAtk=1+sp.pow; else B.buffs.enAtk=1+sp.pow; atbLog(u.name+': '+sp.n+' — ATK UP!','imp'); break;}
    case 'guard':{ if(b.side==='pl')B.buffs.plDef=1+sp.pow; else B.buffs.enDef=1+sp.pow; atbLog(u.name+': '+sp.n+' — DEF UP!','imp'); break;}
    case 'veil':{ if(b.side==='pl')B.buffs.enAtk=Math.max(0.5,1-sp.pow); else B.buffs.plAtk=Math.max(0.5,1-sp.pow); atbLog(u.name+': '+sp.n+'!'); break;}
    case 'vanish':{ b.vanished=true; dmgPop(u.id,'VANISH','magic'); break;}
    case 'fade':{ const t=pickTarget(b.side); if(t)dealDamage(b,t,(u.atk*2-effDef(t))*sp.pow,''); b.fadeT=B.t+4000; break;}
    case 'rage':{ b.rageT=B.t+8000; dmgPop(u.id,'RAGE!','crit'); break;}
  }
}
function commanderAbility(b){
  const a=CMD_ABILITIES.find(x=>x.k===b.cmdAb); if(!a)return;
  B.cds[a.k]=B.t+12000;
  const allies=livingSide(B.pl), foes=livingSide(B.en);
  switch(a.type){
    case 'buff': B.buffs.plAtk=1+a.pow; atbLog('RALLY! The banner\'s blood is up!','imp'); break;
    case 'atbhit': foes.forEach(f=>f.atb=Math.max(-20,f.atb-a.pow)); atbLog('WAR CRY! The foe reels!','imp'); break;
    case 'healAll': allies.forEach(t=>{const h=Math.round(b.u.mag*2*a.pow+10); t.u.hp=clamp(t.u.hp+h,0,t.u.maxhp); dmgPop(t.u.id,'+'+h,'heal');}); atbLog('MEND BANNER!','imp'); break;
    case 'aoeAll': foes.forEach(t=>dealDamage(b,t,(b.u.mag*2.4-effDef(t)*0.4)*a.pow,'magic')); atbLog('FLAME OF COMMAND!','imp'); break;
    case 'revive':{ const dead=B.pl.filter(x=>x.u.hp<=0&&!x.retreated);
      if(dead.length){const t=pick(dead); t.u.hp=Math.round(t.u.maxhp*a.pow); t.atb=0; dmgPop(t.u.id,'RISE!','heal'); atbLog(t.u.name+' rises again!','imp'); renderATB();}
      else atbLog('No fallen to raise.'); break;}
  }
  b.act='attack'; b.cmdAb=null;
}
function tickATB(){
  if(B.over)return;
  B.t+=90;
  /* row flip: wait for all */
  const alive=livingSide(B.pl);
  if(B.plFlip){
    alive.forEach(b=>{ if(b.atb<100) b.atb+=(b.u.spd*2+8)*0.9; });
    if(alive.length&&alive.every(b=>b.atb>=100)){
      alive.forEach(b=>{b.row=b.row==='front'?'back':'front'; b.atb=0;});
      B.plFlip=false; $('btnRows').classList.remove('gold');
      atbLog('THE BANNER WHEELS ABOUT — rows reversed!','imp');
      renderATB();
    }
  } else {
    alive.forEach(b=>{ b.atb+=(b.u.spd*2+8)*0.9; if(b.atb>=100&&!B.queue.includes(b))B.queue.push(b); });
  }
  livingSide(B.en).forEach(b=>{ b.atb+=(b.u.spd*2+8)*0.9; if(b.atb>=100&&!B.queue.includes(b))B.queue.push(b); });
  /* enemy simple AI: heal if healer & ally hurt */
  B.en.forEach(b=>{
    if(b.u.hp<=0)return;
    if(b.u.spec&&(b.u.spec.type==='heal'||b.u.spec.type==='healAll')){
      const hurt=livingSide(B.en).some(x=>x.u.hp<x.u.maxhp*0.55);
      b.act=hurt?'special':'attack';
    }
  });
  if(!B.acting&&B.queue.length){
    B.acting=true;
    const b=B.queue.shift();
    if(b.u.hp>0&&!b.retreated) unitAct(b);
    updateBars();
    setTimeout(()=>{B.acting=false; checkATBEnd();},170);
  }
  updateBars();
  checkATBEnd();
}
function updateBars(){
  document.querySelectorAll('#atb .au').forEach(el=>{
    const id=+el.dataset.id;
    const b=B.pl.find(x=>x.u.id===id)||B.en.find(x=>x.u.id===id);
    if(!b)return;
    const pct=Math.max(0,b.u.hp/b.u.maxhp*100);
    const hi=el.querySelector('.auhp i'); hi.style.width=pct+'%';
    hi.className=pct<30?'low':pct<60?'mid':'';
    const ai=el.querySelector('.auatb i'); ai.style.width=clamp(b.atb,0,100)+'%';
    ai.className=b.atb>=100?'full':'';
    el.classList.toggle('dead',b.u.hp<=0);
    el.querySelector('.aact').textContent=(b.retreated?'💨':ACTICON[b.act]||'')+(b.vanished?'◌':'')+(b.marked?'◎':'');
  });
}
function checkATBEnd(){
  if(B.over)return;
  const plAlive=livingSide(B.pl).length, enAlive=livingSide(B.en).length;
  const plRetreated=B.pl.some(b=>b.retreated&&b.u.hp>0);
  if(enAlive===0) endATB(plAlive>0?'win':'draw');
  else if(plAlive===0) endATB(plRetreated?'retreat':'loss');
}
function endATB(result){
  B.over=true; clearInterval(B.ticker);
  setTimeout(()=>{
    const modal=$('atb'); if(modal)modal.remove();
    const onEnd=B.onEnd;
    resolveFieldBattle(result);
    if(onEnd)onEnd();
  },700);
}
function resolveFieldBattle(result){
  const cfg=B.cfg;
  const plParty=cfg.pl, enParty=cfg.en;
  const plField=plParty.isGarrison?null:plParty;
  const enField=enParty.isGarrison?null:enParty;
  if(result==='win'){
    /* xp to player fighters */
    const totalLv=enParty.units.reduce((a,u)=>a+u.lv,0);
    const fighters=plParty.units;
    const each=Math.max(6,Math.round(totalLv*12/Math.max(1,fighters.length)));
    let lvups=[];
    fighters.forEach(u=>{ const ups=grantXP(u,each); if(ups)lvups.push(u.name+' → LV'+u.lv); });
    if(lvups.length){ announce('<div class="big">LEVEL UP!</div>'+lvups.join(' · ')); }
    if(enField){
      flog('☠ '+enField.id+' is routed!','good');
      enField.el.remove(); F.parties=F.parties.filter(q=>q!==enField);
    }
    if(cfg.siege&&cfg.siege===F.HQ_EN){
      flog('The keep garrison is destroyed! Move a banner onto it to seize victory.','imp');
    }
  } else if(result==='loss'||result==='draw'){
    if(plField){
      flog(plField.id+' was destroyed!','bad');
      plField.el.remove(); F.parties=F.parties.filter(q=>q!==plField);
    } else if(plParty.isGarrison){
      flog('The camp garrison has fallen!','bad');
    }
    if(enField&&enField.units.every(u=>u.hp<=0)){
      enField.el.remove(); F.parties=F.parties.filter(q=>q!==enField);
    }
  } else if(result==='retreat'&&plField){
    /* survivors withdraw one tile toward camp */
    plField.units.forEach(u=>{ if(u.hp<=0)u.hp=1; });
    const dx=Math.sign(F.HQ_PL.x-plField.x),dy=Math.sign(F.HQ_PL.y-plField.y);
    const nx=plField.x+dx,ny=plField.y+dy;
    if(passable(nx,ny)&&!partyAtF(nx,ny)){plField.x=nx; plField.y=ny;}
    plField.done=true; placeTok(plField);
    flog(plField.id+' withdraws, bloodied but alive.','imp');
  }
  drawGarrisonBadges();
  F.parties.forEach(placeTok); computeVision();
  checkFieldEnd();
  if(F.phase==='player'&&!F.fieldOver){
    if(F.selP&&F.parties.includes(F.selP)&&!F.selP.done) showOrders(F.selP);
    else nextParty();
  }
}
/* ---------- ENEMY FIELD TURN ---------- */
async function enemyTurn(){
  F.phase='enemy'; updateTopbar(); clearHi(); hideOrders();
  F.selP=null; F.parties.forEach(p=>p.el.classList.remove('sel'));
  for(const e of F.parties.filter(p=>p.side==='en')){
    if(F.fieldOver)return;
    if(!F.parties.includes(e))continue;
    await new Promise(r=>setTimeout(r,300));
    const r0=bfsF(e);
    let best=null;
    const consider=(def,isHQ)=>{
      for(const k in DIRS){
        const ax=def.x+DIRS[k][0],ay=def.y+DIRS[k][1];
        const key=ax+','+ay;
        const atStart=(ax===e.x&&ay===e.y);
        if(!atStart&&(r0.dist[key]===undefined||partyAtF(ax,ay)))continue;
        if(!atStart&&!passable(ax,ay))continue;
        let score;
        if(isHQ){ const g=def.garrison.reduce((a,u)=>a+Math.max(0,u.hp),0);
          score=80-g*0.4+(g===0?220:0); }
        else{ const fb=facingBonusFrom(ax,ay,def);
          const hp=def.units.reduce((a,u)=>a+Math.max(0,u.hp),0);
          score=fb.mult*100-hp*0.25-(def.stance==='defend'?25:0); }
        if(!best||score>best.score)best={def,isHQ,ax,ay,score,atStart};
      }
    };
    F.parties.filter(p=>p.side==='pl').forEach(t=>consider(t,false));
    consider(F.HQ_PL,true);
    if(best&&best.score>40){
      if(!best.atStart)await walk(e,pathToF(r0,best.ax,best.ay));
      e.face=best.def.x>e.x?'E':best.def.x<e.x?'W':best.def.y>e.y?'S':'N'; placeTok(e);
      if(best.isHQ)await fieldSiege(e,best.def); else await fieldAttack(e,best.def);
      continue;
    }
    /* march */
    let tgt=null,td=1e9;
    F.parties.filter(p=>p.side==='pl').forEach(t=>{const d=Math.abs(t.x-e.x)+Math.abs(t.y-e.y); if(d<td){td=d;tgt=t;}});
    const goal=tgt&&td<8?tgt:F.HQ_PL;
    let bk=null,bd=1e9;
    for(const key in r0.dist){const [x,y]=key.split(',').map(Number);
      if(partyAtF(x,y))continue;
      const d=Math.abs(goal.x-x)+Math.abs(goal.y-y);
      if(d<bd){bd=d;bk=[x,y];}}
    if(bk){ await walk(e,pathToF(r0,bk[0],bk[1]));
      e.face=goal.x>e.x?'E':goal.x<e.x?'W':goal.y>e.y?'S':'N'; placeTok(e); }
  }
  if(F.fieldOver)return;
  /* regen */
  F.parties.forEach(p=>{
    const h=healers(p.units.filter(u=>u.hp>0));
    p.units.forEach(u=>{if(u.hp>0)u.hp=clamp(u.hp+2+h*3,1,u.maxhp);});
    placeTok(p);
  });
  [F.HQ_PL,F.HQ_EN].forEach(hq=>hq.garrison.forEach(u=>{if(u.hp>0)u.hp=clamp(u.hp+4,1,u.maxhp);}));
  F.turn++;
  F.phase='player';
  F.parties.forEach(p=>{p.moved=false;p.acted=false;p.done=false;p.stance=null;placeTok(p);});
  computeVision(); drawGarrisonBadges();
  flog('— Turn '+F.turn+'. Banners recover. —');
  updateTopbar(); checkFieldEnd();
  if(!F.fieldOver)nextParty();
}
function checkFieldEnd(){
  if(F.fieldOver)return;
  const pl=F.parties.some(p=>p.side==='pl');
  const en=F.parties.some(p=>p.side==='en');
  const enGar=F.HQ_EN.garrison.some(u=>u.hp>0);
  const plGar=F.HQ_PL.garrison.some(u=>u.hp>0);
  const fortTaken=F.parties.find(p=>p.side==='pl'&&F.cfg.useFortCheck!==false&&p.x===F.HQ_EN.x&&p.y===F.HQ_EN.y);
  if(fortTaken||(!en&&!enGar)){ fieldEnd(true); return; }
  if(!pl&&!plGar) fieldEnd(false);
}
function fieldEnd(win){
  F.fieldOver=true; hideOrders();
  const es=$('endscreen'); es.style.display='flex';
  $('endText').textContent=win?'★ VICTORY ★':'DEFEAT...';
  $('endBtns').innerHTML='';
  if(win){
    G.battlesWon++;
    /* survivors heal a little; fallen rise at 1 */
    G.roster.forEach(u=>{ if(u.hp<=0)u.hp=1; u.hp=clamp(u.hp+Math.round(u.maxhp*0.3),1,u.maxhp); });
    const n=curBattle.node;
    $('endSub').textContent=n?'The chapter is won.':'The field is yours.';
    const b=document.createElement('button'); b.className='ff gold'; b.textContent='CLAIM THE FIELD ▶';
    b.onclick=()=>{ es.style.display='none'; applyRewards(n); };
    $('endBtns').appendChild(b);
  } else {
    G.roster.forEach(u=>{ u.hp=Math.max(u.hp,Math.round(u.maxhp*0.5)); });
    $('endSub').textContent='The banner limps home to lick its wounds. The road remains.';
    const b=document.createElement('button'); b.className='ff'; b.textContent='WITHDRAW ◀';
    b.onclick=()=>{ es.style.display='none'; enterWorld(); };
    $('endBtns').appendChild(b);
  }
}
function applyRewards(n){
  if(!n){ /* random encounter */
    saveGame(); enterWorld(); return;
  }
  G.cleared[n.i]=true;
  let txt=n.reward.text||'';
  if(n.reward.recruit){ G.roster.push(RECRUITS[n.reward.recruit]()); }
  if(n.reward.recruit2){ G.roster.push(RECRUITS[n.reward.recruit2]()); }
  if(n.reward.ability&&!G.abilities.includes(n.reward.ability)) G.abilities.push(n.reward.ability);
  if(n.ch>=G.chapter) G.chapter=n.ch+1;
  if(n.i===12){ G.openEnded=true; }
  $('rwText').innerHTML=txt;
  $('rwLevels').innerHTML='BANNER: '+G.roster.length+' SOULS · COMMANDER LV '+G.roster[0].lv;
  $('rewardModal').classList.add('show');
  $('rwOk').onclick=()=>{ $('rewardModal').classList.remove('show'); saveGame(); enterWorld(); };
}
/* ---------- BOOT ---------- */
screenHTML();
initTitle();

</script>
